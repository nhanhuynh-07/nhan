<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt lịch Spa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1>ĐẶT LỊCH</h1>
    <p>Đặt lịch ngay để được phục vụ tốt nhất</p>
  </header>

  <section class="booking">
    <div class="container">

      <form class="form">

        <div class="form-group">
          <label>Chọn dịch vụ</label>
          <select>
            <option>Chọn dịch vụ</option>
            <option>Chăm sóc da</option>
            <option>Massage</option>
            <option>Triệt lông</option>
          </select>
        </div>

        <div class="form-group">
          <label>Chọn chi nhánh</label>
          <select>
            <option>Chọn chi nhánh</option>
            <option>HCM</option>
            <option>Hà Nội</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ngày</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Giờ</label>
          <input type="time">
        </div>

        <div class="form-group">
          <label>Họ tên</label>
          <input type="text" placeholder="Nhập họ tên">
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" placeholder="Nhập số điện thoại">
        </div>

        <div class="form-group">
          <label>Ghi chú</label>
          <textarea placeholder="Nhập ghi chú"></textarea>
        </div>
        <button class="btn">ĐẶT LỊCH NGAY</button>
      </form>
    </div>
  </section>
</body>
</html>
